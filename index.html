<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Трекер інцидентів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Трекер інцидентів кібербезпеки</h1>
<p class="subtitle">Система для реєстрації та перегляду інцидентів</p>

<div class="main">

    <div class="block">
        <h2>Додати інцидент</h2>

        <label>Дата</label>
        <input type="date" id="dateInput">

        <label>Тип</label>
        <input type="text" id="typeInput">

        <label>Рівень</label>
        <select id="levelInput">
            <option value="">Оберіть</option>
            <option>Низький</option>
            <option>Середній</option>
            <option>Високий</option>
            <option>Критичний</option>
        </select>

        <label>Коментар</label>
        <textarea id="commentInput"></textarea>

        <label>Хто повідомив</label>
        <input type="text" id="personInput">

        <button id="mainButton" onclick="addIncident()">Додати</button>
    </div>

    <div class="block">
        <h2>Список інцидентів</h2>

        <table>
            <thead>
                <tr>
                    <th>№</th>
                    <th onclick="sortBy('date')">Дата</th>
                    <th onclick="sortBy('type')">Тип</th>
                    <th onclick="sortBy('level')">Рівень</th>
                    <th onclick="sortBy('comment')">Коментар</th>
                    <th onclick="sortBy('person')">Хто повідомив</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <p id="emptyText">Поки що інцидентів немає</p>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
